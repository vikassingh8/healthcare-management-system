# Secrets are stored in Azure Key Vault and injected via CSI driver (Azure Key Vault Provider for Secrets Store CSI Driver)
# This file shows the structure — actual values come from Key Vault at runtime
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: azure-keyvault-secrets
  namespace: healthcare-system
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: ""  # Set to managed identity client ID
    keyvaultName: "hms-keyvault"
    cloudName: "AzurePublicCloud"
    objects: |
      array:
        - |
          objectName: jwt-secret
          objectType: secret
        - |
          objectName: db-connection-string
          objectType: secret
        - |
          objectName: encryption-key
          objectType: secret
    tenantId: ""  # Set to Azure tenant ID
  secretObjects:
    - data:
        - key: JWT_SECRET
          objectName: jwt-secret
        - key: DB_CONNECTION_STRING
          objectName: db-connection-string
      secretName: hms-secrets
      type: Opaque
