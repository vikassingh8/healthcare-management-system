apiVersion: apps/v1
kind: Deployment
metadata:
  name: hms-backend
  namespace: healthcare-system
  labels:
    app: hms-backend
    tier: api
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hms-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: hms-backend
        tier: api
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: hms-workload-identity
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: backend
          image: hmsacr.azurecr.io/hms-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
            - name: JWT_EXPIRY
              value: "8h"
            - name: ALLOWED_ORIGINS
              value: "https://hms.azurefd.net"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: hms-secrets
                  key: JWT_SECRET
            # Azure SQL connection string, sourced from Key Vault via the CSI
            # driver (see secrets.yaml). The production image uses the mssql
            # data driver; no local database file is mounted.
            - name: DB_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: hms-secrets
                  key: DB_CONNECTION_STRING
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: secrets-store
              mountPath: "/mnt/secrets"
              readOnly: true
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: azure-keyvault-secrets
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: hms-backend
                topologyKey: kubernetes.io/hostname
